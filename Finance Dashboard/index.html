<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Dashboard</title>
  <link rel="stylesheet" href="./finance.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Personal Finance Dashboard</h1>
    <p>Manage money with ease</p>
  </header>
  <header class="special">
    <h3>A project by Parsa Akbari</h3>
    <p>Click below for in-depth process on how I made this site</p> 
    <button onclick="document.location='http://www.logiphi.com/tours/parsa/Finance%20Dashboard/process.html'"class="describe">Description</button>
  </header>

  <main>
    <section class="form-section">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <input type="text" id="expense-name" placeholder="Expense Name (e.g. Groceries)" required />
        <input type="number" id="expense-amount" placeholder="Amount (e.g. 250)" required />
        <select id="expense-category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Rent">Rent</option>
          <option value="Utilities">Utilities</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="expense-date" required />
        <button type="submit">Add Expense</button>
      </form>
    </section>

    <section class="transactions-section">
      <h2>Transactions</h2>
      <ul id="transaction-list"></ul>
    </section>


    <section class="charts-section">
      <h2>Expense Charts</h2>
      <canvas id="categoryChart"></canvas>
      <canvas id="monthlyChart"></canvas>
    </section>

    <section class="filters-section">
        <h2>Filter Expenses</h2>
        <select id="filter-category">
          <option value="All">All</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Rent">Rent</option>
          <option value="Utilities">Utilities</option>
          <option value="Other">Other</option>
        </select>
        <input type="month" id="filter-date" />

        
    </section>

  </main>

  <footer>Contact me at: p1rsa.ak@gmail.com </footer>
  <footer> <button onclick="document.location='http://www.logiphi.com/tours/parsa'">Homepage</button></footer>



  <script src="finance.js"></script>
</body>
</html>
